name: test
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: compliance_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Local CI postgres (replaces cloud Supabase in PRs)
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/compliance_test
      MIGRATION_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/compliance_test
      # Stub Supabase — tests don't hit Storage/Auth in CI
      SUPABASE_URL: https://stub.invalid
      SUPABASE_ANON_KEY: stub
      SUPABASE_SERVICE_ROLE_KEY: stub
      SUPABASE_JWT_SECRET: stub
      SUPABASE_STORAGE_BUCKET: call-audio
      # Provider keys empty — tests mock providers
      DEEPGRAM_API_KEY: ""
      OPENROUTER_API_KEY: ""
      OPENAI_API_KEY: ""
      GEMINI_API_KEY: ""
      ASSEMBLYAI_API_KEY: ""
      ADMIN_KEY: test-admin
      DEV_ALL_ADMIN: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Apply alembic migrations to CI postgres
        run: alembic upgrade head
      - run: pytest -v --tb=short

  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v3/package-lock.json
      - run: npm ci
      - run: npm run test:unit -- --run

  playwright:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'e2e')
    defaults:
      run:
        working-directory: frontend-v3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v3/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
