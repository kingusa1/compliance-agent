# Railway service config for the FastAPI backend.
# Drop this file alongside backend/ and Railway will pick it up automatically
# when the service root is set to backend/.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Watch-pattern filtering is handled by the repo-root railway.json which
# matches against the full repo path (`backend/**`). Putting it here too
# breaks `railway up --service=compliance-agent --ci` because the CLI
# uploads ./backend as the snapshot root, so paths show up as `app/...`
# not `backend/app/...` and the build is skipped as "no changes".

[deploy]
# /healthz is liveness only (returns 200 always once the process is up).
# /readyz returns 503 when the DB is unreachable — don't use it for the
# Railway healthcheck or you'll bounce the container during cold-DB seconds.
healthcheckPath = "/healthz"
# 30s was too tight — alembic can take 60-90s on a cold pooler connection
# the first time. Bumped to 300s; healthz path itself responds in <1s once
# uvicorn is up.
healthcheckTimeout = 300
# Restart on any non-zero exit; cap retries so a wedged process can't loop
# forever burning Railway minutes.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# Railway's default SIGTERM grace is 30s; the lifespan idle-loop bounded
# shutdown completes in <5s so this is comfortable headroom.
gracefulShutdownTimeout = 30
